server:
  port: ${PORT:8080}

spring:
  application:
    name: meetx-backend

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/meetx}
      auto-index-creation: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

livekit:
  api-key: ${LIVEKIT_API_KEY}
  api-secret: ${LIVEKIT_API_SECRET}
  token-ttl-seconds: 86400

logging:
  level:
    com.meetx: DEBUG
    org.springframework.security: INFO
