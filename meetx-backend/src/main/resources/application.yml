server:
  port: ${PORT:8080}

spring:
  application:
    name: meetx-backend

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/meetx}
      auto-index-creation: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  # ── Gmail SMTP ──────────────────────────────────────────────
  # mail:
  #   host: smtp.gmail.com
  #   port: 587
  #   username: ${MAIL_USERNAME}
  #   password: ${MAIL_PASSWORD}
  #   properties:
  #     mail:
  #       smtp:
  #         auth: true
  #         starttls:
  #           enable: true
  #           required: true
  #       debug: false
  #   default-encoding: UTF-8

  # ── Resend SMTP ──────────────────────────────────────────────
  mail:
    host: smtp.resend.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
        debug: false
    default-encoding: UTF-8

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

livekit:
  api-key: ${LIVEKIT_API_KEY}
  api-secret: ${LIVEKIT_API_SECRET}
  token-ttl-seconds: 86400

logging:
  level:
    com.meetx: DEBUG
    org.springframework.security: INFO
    org.springframework.mail: INFO
